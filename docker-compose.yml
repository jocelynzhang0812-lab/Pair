services:
  postgres:
    image: postgres:15
    container_name: pair-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pair
      POSTGRES_PASSWORD: pair
      POSTGRES_DB: pair
    ports:
      - '5432:5432'
    volumes:
      - pair-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pair -d pair']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    container_name: pair-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - pair-redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pair-postgres-data:
  pair-redis-data:
