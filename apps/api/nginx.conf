# Nginx 生产配置（api.pairapp.cn + pairapp.cn）
# 放到 /etc/nginx/sites-available/pair，然后软链到 sites-enabled

# 强制 HTTPS
server {
    listen 80;
    server_name api.pairapp.cn pairapp.cn www.pairapp.cn;
    return 301 https://$server_name$request_uri;
}

# 后端 API
server {
    listen 443 ssl http2;
    server_name api.pairapp.cn;

    ssl_certificate /etc/letsencrypt/live/api.pairapp.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.pairapp.cn/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Web 前端（如果你不用 Vercel，而是自建 Next.js）
server {
    listen 443 ssl http2;
    server_name pairapp.cn www.pairapp.cn;

    ssl_certificate /etc/letsencrypt/live/pairapp.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pairapp.cn/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
